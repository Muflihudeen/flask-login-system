<!DOCTYPE html>
<html>

<head>
    <title>Login</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

    <div class="container">

        <h1>Login</h1>

        <form method="POST">

            <input type="text"
                    name="username"
                    placeholder="Enter username"
                    required>

            <input type="password"
                   name="password"
                   placeholder="Enter password"
                   required>
                   
            <button type="submit">
                Login
            </button>

            <p>Don't have an account?
                <a href="/register">Register here</a>
            </p>

        </form>

    </div>

</body>

</html>
