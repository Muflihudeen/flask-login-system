<!DOCTYPE html>
<html>

<head>
    <title>Register</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css')  }}">
</head>

<body>
    <div class="container">
        <h1>Register</h1>

        <form method="POST">

            <input type="text"
                    name="username"
                    placeholder="Enter username"
                    required>

            <input type="password"
                   name="password"
                   placeholder="Enter password"
                   required>
                   
            <button type="submit">
                Register
            </button>

            <p>Already have an account?
                <a href="/login">Login here</a>
            </p>

        </form>

    </div>

</body>

</html>
